<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x1f47a; GMPlayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

   
        <div class="player">

        <h1>&#119137; &ensp;  Goblin Music Player  &#x1f47a;</h1>
        <input type="file" id="fileInput" accept="audio/*" multiple>

        <audio id="audio"></audio>

        <div class="controls">
            <button id="playPause">Play/Pause</button>
            <button id="stop">Stop</button>
        </div>

        <!-- Progress Bar  Container (clickable area)-->
         <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
            
        </div>

        <p id="status">No song loaded</p>
        </div> 
    </div>

    <div class="playlist">
        <h3>Playlist</h3>
        <ul id="playlist"></ul>
    </div>

    <footer class="GMPlayer-footer">
        <p>Goblin Music Player v0.1 * 
        <a href="https://github.com/TechGoblin-7/GMPlayer" target="_blank">GitHub Repository</a>
    </p>

    <div>
        <img class="logo" src="assets/Digital Jolly Roger.png" alt="logo">
    </div>

    </footer>
    

    <script src="GoblinAE.js"></script>

</body>
 
 

</html>
