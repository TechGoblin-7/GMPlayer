<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x1f47a;GMPlayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

   
        <div class="player">

        <h1>&#119137; Goblin Music Player &#x1f47a;</h1>
        <input type="file" id="fileInput" accept="audio/*">

        <audio id="audio"></audio>

        <div class="controls">
            <button id="playPause">Play/Pause</button>
            <button id="stop">Stop</button>
        </div>

        <p id="status">No song loaded</p>
        </div> 
    </div>
    

    <div class="logo">
        <img src="assets/Digital Jolly Roger.png" alt="logo">
    </div>
    

    <script src="GoblinAE.js"></script>

</body>
 
 

</html>
