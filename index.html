<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="theme-color" content="57c855">


    <title>&#x1f47a; GMPlayer</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    

</head>
<body id="top">

    <div class="app">

   
        <div class="player">
            <div class="header">
                <img class="logo1" src="assets/Goblinapplogo.png" alt="logo1">
                <h1>Goblin Music Player &#119137;</h1>
            </div>
                

            <h2 id="nowPlaying">No Song Playing</h2>

            
            <!-- Progress Bar  Container (clickable area)-->
            <div class="progress-container" id="progressContainer">
                <div class="progress" id="progress"></div>
            </div>

            <div id="timeDisplay">0:00/0:00</div>

            <audio id="audio"></audio>

            <input type="range" id="volume" min="0" max="100" vaule="100">

            <button id="mute">&#128266;</button>

            <div class="controls">
                <button id="shuffle">🔀 Off</button>
                <button id="prev">&#8617;</button>
                <button id="playPause">&#x23EF;</button>
                <button id="stop">&#9209;</button>
                <button id="next">&#8618;</button>
                <button id="repeat">🔁 Off</button>
            </div>

            <div class="sleep-timer">
                <select id="sleepSelect">
                    <option value="0">Sleep Timer Off</option>
                    <option value="1">1 min</option>
                    <option value="3">3 min</option>
                    <option value="5">5 min</option>
                    <option value="7">7 min</option>
                    <option value="10">10 min</option>
                    <option value="15">15 min</option>
                    <option value="30">30 min</option>
                    <option value="60">60 min</option>
                </select>

                <span id="sleepStatus"></span>
            </div>
        </div>
        
            <input type="file" id="fileInput" accept="audio/*" multiple>
            
        <div class="playlist">

            <h3>Playlist</h3>
            <ul id="playlist"></ul>
        </div>

            <p id="status">No song loaded</p>

        

    

        <footer class="GMPlayer-footer">

            <p>
                Goblin Music Player v1.0.0 *
                <a href="https://github.com/TechGoblin-7/GMPlayer" target="_blank">GitHub Repository
                </a>
            </p>

        </footer>

        <a href="#top">
            <img class="logo" src="assets/Digital Jolly Roger.png" alt="logo">
        </a>

    </div>
    

    <script src="GoblinAE.js"></script>

</body>
 
 

</html>
